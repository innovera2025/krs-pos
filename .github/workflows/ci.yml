name: CI

# Phase 3 quality gates for KRS POS.
# Runs on every push to main and on every pull request. Jobs run in parallel.
on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # quality: type-check, production build, and unit tests (with coverage).
  # `next build` imports src/lib/env.ts which fail-fasts unless DATABASE_URL +
  # AUTH_SECRET are set. The build does NOT connect to a DB, so a dummy
  # DATABASE_URL string is sufficient; AUTH_SECRET is generated ephemerally.
  # ---------------------------------------------------------------------------
  quality:
    name: Type-check, build, unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Generate an ephemeral AUTH_SECRET (>=16 chars). Never hardcode a secret
      # literal — keep gitleaks clean. Exported to $GITHUB_ENV for later steps.
      - name: Generate ephemeral CI secrets
        run: echo "CI_AUTH_SECRET=$(openssl rand -hex 24)" >> "$GITHUB_ENV"

      - name: Type-check
        run: npm run type-check

      - name: Build
        env:
          # Build does not connect to Postgres; env.ts only validates the string
          # shape (must start with postgres). A dummy URL satisfies the guard.
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          AUTH_SECRET: ${{ env.CI_AUTH_SECRET }}
        run: npm run build

      - name: Unit tests (with coverage)
        run: npm test -- --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
          retention-days: 7

  # ---------------------------------------------------------------------------
  # e2e: Playwright against a real Next.js server backed by a Postgres 16
  # service container. playwright.config.ts has NO webServer, so this job starts
  # the server itself and waits for /login before running the suite.
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: krs_app
          POSTGRES_PASSWORD: ci_pw
          POSTGRES_DB: krs_pos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U krs_app -d krs_pos"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://krs_app:ci_pw@localhost:5432/krs_pos
      AUTH_TRUST_HOST: "true"
      AUTH_URL: http://127.0.0.1:3100
      E2E_BASE_URL: http://127.0.0.1:3100
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Ephemeral AUTH_SECRET for the build + running server. Exported to
      # $GITHUB_ENV so every subsequent step (build, start, tests) inherits it.
      - name: Generate ephemeral AUTH_SECRET
        run: echo "AUTH_SECRET=$(openssl rand -hex 24)" >> "$GITHUB_ENV"

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npx prisma db seed

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start app server
        run: |
          nohup npx next start -p 3100 > server.log 2>&1 &
          echo "Started Next.js server (pid $!)"

      - name: Wait for server
        run: |
          echo "Waiting for http://127.0.0.1:3100/login ..."
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3100/login || true)
            if [ "$code" = "200" ]; then
              echo "Server is up (HTTP $code)."
              exit 0
            fi
            echo "Attempt $i: HTTP $code — retrying in 1s"
            sleep 1
          done
          echo "Server did not become ready in time. Server log:"
          cat server.log || true
          exit 1

      - name: Run e2e tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
            server.log
          if-no-files-found: ignore
          retention-days: 7

  # ---------------------------------------------------------------------------
  # docker-build: verify the production image builds (regression guard for the
  # two previously-fixed Docker breakages: missing public/ and missing
  # lockfile). Build only — never push.
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t krs-pos:ci .

  # ---------------------------------------------------------------------------
  # gitleaks: scan history for committed secrets (OSS, no-license path).
  # ---------------------------------------------------------------------------
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
