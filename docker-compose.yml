services:
  db:
    image: postgres:16-alpine
    container_name: krs-pos-db
    restart: unless-stopped
    environment:
      # Superuser / cluster owner — used by the db image init AND by the migrate
      # service (DDL via prisma migrate deploy needs these privileges).
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-krs_pos}
      # Least-privilege app role created once on a fresh data dir by
      # db/init/01-app-role.sh (DML-only: SELECT/INSERT/UPDATE, no DELETE/DDL).
      APP_DB_USER: ${APP_DB_USER:-krs_app}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
    # No host port mapping: Postgres is reachable only on the internal compose
    # network (service host `db`), never published to the host / LAN.
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Runs once on a FRESH data dir: creates the least-priv `krs_app` role.
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-krs_pos}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot migration runner. Builds the `migrate` Dockerfile target (full deps +
  # prisma CLI) and runs `prisma migrate deploy` once, then exits 0. The app service
  # waits for this to complete successfully before it starts.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    container_name: krs-pos-migrate
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Migrations need DDL → connect as the SUPERUSER, not the least-priv app role.
      DATABASE_URL: ${MIGRATE_DATABASE_URL}

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: krs-pos-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      # Start only after migrations have been applied (migrate exits 0).
      migrate:
        condition: service_completed_successfully
    environment:
      # The app connects as the LEAST-PRIVILEGE `krs_app` role (DML only). Inside
      # compose this must point at host `db`, e.g.
      # postgresql://krs_app:PASSWORD@db:5432/krs_pos?schema=public
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production
      # REQUIRED: Auth.js session-signing secret. Without it src/lib/env.ts throws at
      # boot and the container never becomes healthy. Supplied from the git-ignored .env.
      AUTH_SECRET: ${AUTH_SECRET}
      # Behind a reverse proxy without an explicit AUTH_URL, trust the forwarded host
      # header so Auth.js builds correct callback/redirect URLs. Defaults to true here.
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      # Optional explicit base-URL override (e.g. https://krspos.example.com). Empty =
      # unset → Auth.js infers it (or relies on AUTH_TRUST_HOST). Set this to the
      # public HTTPS URL in production so Auth.js builds correct callback/redirect URLs.
      AUTH_URL: ${AUTH_URL:-}
      # KRS connection password encryption key (AES-256-GCM). Optional at boot (the
      # app lazy-fails only when a KRS feature actually runs), but REQUIRED in prod to
      # use the KRS integration. Supplied from the git-ignored .env.
      KRS_CONFIG_ENC_KEY: ${KRS_CONFIG_ENC_KEY:-}
      # KRS inbound auto-pull (Phase 1). The app reads these at boot via src/lib/env.ts.
      # Without them here the container never sees them even if they are in .env, so the
      # /api/krs/auto-sync endpoint would stay disabled/unauthenticated.
      #  - KRS_SYNC_TRIGGER_SECRET: bearer secret the krs-cron sidecar authenticates with
      #    (must match the sidecar's value in docker-compose.prod.yml). Empty = endpoint 503.
      #  - KRS_AUTO_SYNC_ENABLED: kill switch; must be "true" to enable. Default false (opt-in).
      #  - KRS_AUTO_SYNC_WAREHOUSE: optional sp_Onhand @Warehouse filter; empty = all warehouses.
      KRS_SYNC_TRIGGER_SECRET: ${KRS_SYNC_TRIGGER_SECRET:-}
      KRS_AUTO_SYNC_ENABLED: ${KRS_AUTO_SYNC_ENABLED:-false}
      KRS_AUTO_SYNC_WAREHOUSE: ${KRS_AUTO_SYNC_WAREHOUSE:-}
      # KRS outbound write-back (krs-sync P2). The app reads these at boot via
      # src/lib/env.ts; without them here the container never sees them even if they
      # are in .env, so the dispatch endpoint would stay disabled/unauthenticated and
      # the sandbox would read as unconfigured.
      #  - KRS_OUTBOUND_ENABLED: kill switch for the KRS write; must be "true" to write.
      #    Default false (opt-in) — the SALE outbox is still populated, the write is gated.
      #  - KRS_DISPATCH_SECRET: bearer secret the krs-dispatch-cron sidecar authenticates
      #    with (must match the sidecar value in docker-compose.prod.yml). Empty = 503.
      #  - KRS_SANDBOX_*: the SEPARATE sandbox write target (NOT the prod inbound KRS).
      #    Empty host/db/user/pass = sandbox unconfigured → the write refuses cleanly.
      KRS_OUTBOUND_ENABLED: ${KRS_OUTBOUND_ENABLED:-false}
      KRS_DISPATCH_SECRET: ${KRS_DISPATCH_SECRET:-}
      KRS_SANDBOX_HOST: ${KRS_SANDBOX_HOST:-}
      KRS_SANDBOX_PORT: ${KRS_SANDBOX_PORT:-1433}
      KRS_SANDBOX_DB: ${KRS_SANDBOX_DB:-}
      KRS_SANDBOX_USER: ${KRS_SANDBOX_USER:-}
      KRS_SANDBOX_PASS: ${KRS_SANDBOX_PASS:-}
      KRS_SANDBOX_SSL: ${KRS_SANDBOX_SSL:-true}
      KRS_SANDBOX_TRUST_CERT: ${KRS_SANDBOX_TRUST_CERT:-true}
      # KRS product-image FTP (product images mapped by KRS PictureName). The app
      # reads these at request time via src/lib/env.ts; compose only forwards
      # explicitly-listed vars, so without these lines the container never sees them
      # even if they are in .env, and GET /api/products/image stays inactive (404).
      #  - KRS_FTP_HOST/USER/PASS: the plain-FTP image store creds. Empty = inactive.
      #  - KRS_FTP_COMPANY/BASEPATH: path segments ({BASEPATH}/{COMPANY}/Image/{file}).
      #  - KRS_IMAGE_CACHE_DIR: local image cache. Ephemeral /tmp is fine for now (only
      #    ~1 image exists); a named volume at this path is an optional future
      #    optimization to avoid re-fetch on restart — NOT added now.
      KRS_FTP_HOST: ${KRS_FTP_HOST:-}
      KRS_FTP_USER: ${KRS_FTP_USER:-}
      KRS_FTP_PASS: ${KRS_FTP_PASS:-}
      KRS_FTP_COMPANY: ${KRS_FTP_COMPANY:-SNP}
      KRS_FTP_BASEPATH: ${KRS_FTP_BASEPATH:-updateEXE}
      KRS_IMAGE_CACHE_DIR: ${KRS_IMAGE_CACHE_DIR:-/tmp/krs-images}
      #  - KRS_FTP_SECURE: explicit FTPS (AUTH TLS) toggle. Default false = plain
      #    FTP (what the KRS store speaks today); set "true" only for a TLS store.
      KRS_FTP_SECURE: ${KRS_FTP_SECURE:-false}
    ports:
      # Bind to localhost only — the public entrypoint is the Caddy reverse proxy
      # (docker-compose.prod.yml, ports 80/443). Caddy reaches the app over the
      # compose network (service host `app`), so this host mapping is for local
      # debugging only and is never internet-reachable.
      - "127.0.0.1:3000:3000"
    # Cap container resources so a single app can't starve the host. The Compose
    # Spec honors `deploy.resources.limits` under plain `docker compose up`.
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    # Liveness + DB-readiness probe. Hits GET /api/health (public), which runs a
    # `SELECT 1` and returns 503 when Postgres is unreachable — so the container is
    # marked unhealthy on a booted-but-broken app, not just a crashed process.
    # BusyBox `wget` (present in node:20-alpine) exits non-zero on a non-2xx status.
    # start_period gives Next.js time to boot before failures count.
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://127.0.0.1:3000/api/health || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgdata:
