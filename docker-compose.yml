services:
  db:
    image: postgres:16-alpine
    container_name: krs-pos-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-krs_pos}
    # No host port mapping: Postgres is reachable only on the internal compose
    # network (service host `db`), never published to the host / LAN.
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-krs_pos}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot migration runner. Builds the `migrate` Dockerfile target (full deps +
  # prisma CLI) and runs `prisma migrate deploy` once, then exits 0. The app service
  # waits for this to complete successfully before it starts.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    container_name: krs-pos-migrate
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: krs-pos-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      # Start only after migrations have been applied (migrate exits 0).
      migrate:
        condition: service_completed_successfully
    environment:
      # Inside compose this must point at host `db`, e.g.
      # postgresql://krs_app:PASSWORD@db:5432/krs_pos?schema=public
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production
      # REQUIRED: Auth.js session-signing secret. Without it src/lib/env.ts throws at
      # boot and the container never becomes healthy. Supplied from the git-ignored .env.
      AUTH_SECRET: ${AUTH_SECRET}
      # Behind a reverse proxy without an explicit AUTH_URL, trust the forwarded host
      # header so Auth.js builds correct callback/redirect URLs. Defaults to true here.
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      # Optional explicit base-URL override (e.g. http://localhost:3000). Empty = unset
      # → Auth.js infers it (or relies on AUTH_TRUST_HOST).
      AUTH_URL: ${AUTH_URL:-}
    ports:
      - "3000:3000"
    # Cap container resources so a single app can't starve the host. The Compose
    # Spec honors `deploy.resources.limits` under plain `docker compose up`.
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    # Liveness + DB-readiness probe. Hits GET /api/health (public), which runs a
    # `SELECT 1` and returns 503 when Postgres is unreachable — so the container is
    # marked unhealthy on a booted-but-broken app, not just a crashed process.
    # BusyBox `wget` (present in node:20-alpine) exits non-zero on a non-2xx status.
    # start_period gives Next.js time to boot before failures count.
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://localhost:3000/api/health || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgdata:
