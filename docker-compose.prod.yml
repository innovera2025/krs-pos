# Production overlay — adds the Caddy reverse proxy (automatic HTTPS via
# Let's Encrypt) in front of the app. Compose with the base file:
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Requirements:
#   - DNS for the domain in deploy/Caddyfile must point at this host (A record).
#   - Inbound 80 + 443 must be open in the cloud firewall (e.g. Lightsail networking).
# Caddy obtains + auto-renews the TLS certificate and proxies to the app container
# on the internal compose network (app:3000). The app is not exposed publicly itself
# (the base file binds it to 127.0.0.1 only).
services:
  caddy:
    image: caddy:2-alpine
    container_name: krs-pos-caddy
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  # KRS inbound auto-pull scheduler (krs-sync inbound auto-pull). A tiny sidecar
  # that POSTs the bearer-protected auto-sync trigger on a cron interval. It lives in
  # this PROD overlay (not the base file) so a local `docker compose up` does NOT run
  # the scheduler — it activates only with `-f docker-compose.yml -f docker-compose.prod.yml`.
  #
  # It reaches the app over the INTERNAL compose network at app:3000 (the base file
  # binds the app to 127.0.0.1 on the host only; the service hostname `app` resolves
  # on the compose network).
  #
  # We use a plain `sh` poll-loop (curl + sleep), NOT a cron daemon: curlimages/curl
  # runs as a NON-root user and busybox `crond` needs root + a crontab directory, so
  # it crash-loops. A sleep-loop only needs sh/curl/sleep (all present) and runs fine
  # unprivileged. Interval = KRS_AUTO_SYNC_INTERVAL_SECONDS (default 300 = 5 min).
  #
  # The endpoint itself is the real safety gate: it is bearer-authenticated, opt-in
  # (KRS_AUTO_SYNC_ENABLED), single-run-locked, and fail-safe. If
  # KRS_SYNC_TRIGGER_SECRET is unset the endpoint returns 503 and no stock changes —
  # the sidecar simply logs the HTTP status. NEVER bake the secret into the image: it
  # is passed from the git-ignored .env at runtime, and only the HTTP status code (not
  # the secret or the response body) is logged.
  krs-cron:
    image: curlimages/curl:latest
    container_name: krs-pos-cron
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      # Bearer secret for the auto-sync endpoint (from the git-ignored .env). Sent as
      # `Authorization: Bearer <value>`. NEVER committed; NEVER logged by the app.
      KRS_SYNC_TRIGGER_SECRET: ${KRS_SYNC_TRIGGER_SECRET:-}
      # Poll interval in SECONDS. Default 300 (every 5 minutes).
      KRS_AUTO_SYNC_INTERVAL_SECONDS: ${KRS_AUTO_SYNC_INTERVAL_SECONDS:-300}
    # Poll loop: every interval, POST the internal endpoint (the app applies the delta,
    # idempotently). Only the HTTP status is logged — never the secret or response body.
    # No `set -e`: a transient curl failure must not kill the loop.
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "krs-cron: polling http://app:3000/api/krs/auto-sync every $${KRS_AUTO_SYNC_INTERVAL_SECONDS}s"
        while true; do
          curl -s -o /dev/null -w "krs-auto-sync: HTTP %{http_code}\n" -X POST \
            -H "Authorization: Bearer $${KRS_SYNC_TRIGGER_SECRET}" \
            -H "Content-Type: application/json" -d '{}' \
            http://app:3000/api/krs/auto-sync || echo "krs-auto-sync: request failed"
          sleep "$${KRS_AUTO_SYNC_INTERVAL_SECONDS}"
        done

volumes:
  caddy_data:
  caddy_config:
